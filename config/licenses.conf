# Oracle DBA Toolkit — License Configuration
# Declare all Oracle options and packs licensed for this environment.
# Used by wave6-governance/licensing/feature-usage-audit.sh to flag exposures.
#
# Set YES if licensed, NO if not licensed.
# This file is safe to commit — it contains no credentials or pricing info.

# ── Core Database ─────────────────────────────────────────────────────────────
LICENSE_EE=YES                      # Oracle Database Enterprise Edition

# ── Management Packs ──────────────────────────────────────────────────────────
LICENSE_DIAGNOSTICS_PACK=YES        # Diagnostics Pack: AWR, ADDM, ASH, Real-Time SQL Monitoring
LICENSE_TUNING_PACK=YES             # Tuning Pack: SQL Tuning Advisor, SQL Access Advisor

# ── Database Options (extra cost) ─────────────────────────────────────────────
LICENSE_PARTITIONING=NO             # Partitioning option (user tables/indexes)
                                    # NOTE: "Partitioning (system)" is always EE base — no license needed.
                                    #       Only user-created partitioned tables require this.

LICENSE_ADVANCED_SECURITY=NO        # Advanced Security option
                                    # NOTE: TDE licensing is contract-dependent.
                                    #       Oracle 12.2+ documentation suggests TDE tablespace
                                    #       encryption is included in EE base, but some Oracle
                                    #       support notes indicate Advanced Security may be required
                                    #       depending on your contract.
                                    #       The audit script flags TDE as [CHECK] — confirm with
                                    #       your Oracle account manager or LMS before setting YES/NO.

LICENSE_MULTITENANT=NO              # Oracle Multitenant option
                                    # NOTE: Single PDB per CDB is FREE in Oracle 19c EE.
                                    #       Set YES only if you have 2+ PDBs per CDB.
                                    #       The script auto-checks PDB count when IS_CDB=YES.

LICENSE_RAC=NO                      # Real Application Clusters
LICENSE_ACTIVE_DATA_GUARD=NO        # Active Data Guard (read-only standby queries)
LICENSE_ADVANCED_COMPRESSION=NO     # Advanced Compression
LICENSE_DATABASE_VAULT=NO           # Database Vault
LICENSE_LABEL_SECURITY=NO           # Label Security
LICENSE_SPATIAL_GRAPH=NO            # Spatial and Graph
LICENSE_OLAP=NO                     # OLAP option
LICENSE_ADVANCED_ANALYTICS=NO       # Advanced Analytics / Oracle Machine Learning
LICENSE_GOLDENGATE=NO               # Oracle GoldenGate

# ── License Metrics ───────────────────────────────────────────────────────────
LICENSE_METRIC=NAMED_USER_PLUS      # NAMED_USER_PLUS or PROCESSOR
LICENSE_USER_COUNT=6000             # Named User Plus count (set 0 if using PROCESSOR metric)
